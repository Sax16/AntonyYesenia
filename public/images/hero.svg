<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9b1f33"/>
      <stop offset=".5" stop-color="#c8324a"/>
      <stop offset="1" stop-color="#d4a259"/>
    </linearGradient>
    <radialGradient id="glow" cx=".5" cy=".4" r=".7">
      <stop offset="0" stop-color="#fff" stop-opacity=".25"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#glow)"/>
  <g fill="#fff" opacity=".18">
    <circle cx="250" cy="200" r="60"/>
    <circle cx="1350" cy="320" r="80"/>
    <circle cx="1450" cy="780" r="50"/>
    <circle cx="180" cy="820" r="40"/>
  </g>
  <text x="800" y="540" font-family="Georgia, serif" font-size="48" fill="#fff" opacity=".55" text-anchor="middle">Reemplazá esta imagen con la foto principal</text>
</svg>
